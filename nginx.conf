# =============================================================================
# OmniChat — Nginx configuration for static JS bundle hosting
# =============================================================================
# Serves the compiled Web Component bundles with appropriate headers.
# In production, replace this with a CDN configuration.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # ---------------------------------------------------------------------------
    # CORS headers — allow any origin to load the JS bundles
    # In production, restrict this to your specific domains.
    # ---------------------------------------------------------------------------
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # ---------------------------------------------------------------------------
    # Cache control — JS bundles are immutable per build
    # ---------------------------------------------------------------------------
    location ~* \.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ---------------------------------------------------------------------------
    # Default — serve static files
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ =404;
    }

    # Handle OPTIONS preflight requests
    location @options {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }
}
