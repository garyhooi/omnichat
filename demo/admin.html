<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniChat Admin Dashboard Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.25rem;
            color: #111827;
        }

        #dashboard-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: white;
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        /* The omnichat-admin component needs to be told to take up full space */
        omnichat-admin {
            display: block;
            width: 100%;
            height: 100%;
        }

        .login-form {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-form h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background-color: #4338ca;
        }

        .error-message {
            color: #dc2626;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
            display: none;
        }
        
        .loading-message {
            color: #2563eb;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
            display: none;
        }
    </style>

    <!-- Load OmniChat Admin Bundle from jsDelivr CDN -->
    <script src="https://cdn.jsdelivr.net/gh/garyhooi/omnichat@main/apps/web/dist/omnichat-admin.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/gh/garyhooi/omnichat@main/apps/web/dist/omnichat-client.js" crossorigin="anonymous"></script>
    
    <!-- Fallback for local testing if the CDN version isn't pushed to GitHub yet -->
    <script>
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT' && e.target.src.includes('jsdelivr')) {
                console.warn('CDN script failed to load. Falling back to local build...');
                const localScript = document.createElement('script');
                if (e.target.src.includes('omnichat-admin')) {
                    localScript.src = '../apps/web/dist/omnichat-admin.js';
                } else if (e.target.src.includes('omnichat-client')) {
                    localScript.src = '../apps/web/dist/omnichat-client.js';
                }
                document.head.appendChild(localScript);
            }
        }, true);
    </script>
</head>
<body>
    <div class="header">
        <h1>OmniChat Admin Demo</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="demo-tabs" style="display: flex; gap: 10px;">
                <button id="tab-login" class="tab-btn active" style="padding: 6px 12px; border-radius: 4px; border: 1px solid #d1d5db; background: #e0e7ff; color: #4338ca; cursor: pointer; font-weight: 500;">Login</button>
                <button id="tab-demo" class="tab-btn" style="padding: 6px 12px; border-radius: 4px; border: 1px solid #d1d5db; background: white; color: #374151; cursor: pointer; font-weight: 500;">Admin Dashboard</button>
            </div>
            <small>CDN Version</small>
        </div>
    </div>

    <!-- The container where we either show the login form or the admin component -->
    <div id="dashboard-container">
        <!-- Content will be injected here via JavaScript -->
    </div>

    <script>
        const SERVER_URL = 'http://localhost:3001';

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('omnichat_demo_token');
            const isDemo = localStorage.getItem('omnichat_ui_demo_mode');
            
            if (isDemo === 'true') {
                renderDemoMode();
                updateTabStyles('tab-demo');
            } else if (token) {
                renderAdminComponent(token);
                updateTabStyles('tab-login');
            } else {
                renderLoginForm();
                updateTabStyles('tab-login');
            }

            document.getElementById('tab-login').addEventListener('click', () => {
                localStorage.removeItem('omnichat_ui_demo_mode');
                // Force logout when clicking the Login tab manually
                localStorage.removeItem('omnichat_demo_token');
                updateTabStyles('tab-login');
                renderLoginForm();
            });

            document.getElementById('tab-demo').addEventListener('click', () => {
                localStorage.setItem('omnichat_ui_demo_mode', 'true');
                updateTabStyles('tab-demo');
                renderDemoMode();
            });
        });

        function updateTabStyles(activeId) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.id === activeId) {
                    btn.style.background = '#e0e7ff';
                    btn.style.color = '#4338ca';
                } else {
                    btn.style.background = 'white';
                    btn.style.color = '#374151';
                }
            });
        }

        function renderDemoMode() {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = `
                <div style="width: 100%; height: 100%; position: relative;">
                    <!-- Admin Dashboard -->
                    <omnichat-admin server-url="http://localhost:3001" token="demo-token-123"></omnichat-admin>
                </div>
            `;
        }

        function renderLoginForm() {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = `
                <div class="login-form">
                    <h2>Admin Login</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" required autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="login-btn">Sign In</button>
                        <div id="error-message" class="error-message"></div>
                        <div id="loading-message" class="loading-message">Authenticating...</div>
                    </form>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('error-message');
                const loadingDiv = document.getElementById('loading-message');

                errorDiv.style.display = 'none';
                loadingDiv.style.display = 'block';

                try {
                    const response = await fetch(`${SERVER_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Invalid credentials');
                    }

                    // Save token and load the component
                    localStorage.setItem('omnichat_demo_token', data.accessToken);
                    localStorage.removeItem('omnichat_ui_demo_mode');
                    renderAdminComponent(data.accessToken);

                } catch (error) {
                    errorDiv.textContent = error.message;
                    errorDiv.style.display = 'block';
                    loadingDiv.style.display = 'none';
                }
            });
        }

        function renderAdminComponent(token) {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = ''; // Clear container

            // Create the custom web element
            const adminElement = document.createElement('omnichat-admin');
            adminElement.setAttribute('server-url', SERVER_URL);
            adminElement.setAttribute('token', token);

            // Handle the logout event emitted by the component
            adminElement.addEventListener('omnichat:logout', () => {
                localStorage.removeItem('omnichat_demo_token');
                localStorage.removeItem('omnichat_ui_demo_mode');
                renderLoginForm();
            });

            container.appendChild(adminElement);
        }
    </script>
</body>
</html>
